<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Void Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --void-bg: #030406;
            --soul-color: #8b9bb4;
            --soul-glow: rgba(139, 155, 180, 0.8);
            --active-glow: #d8e2f0;
            --panel-bg: rgba(10, 14, 20, 0.85);
            --border-color: #1f2937;
        }

        body {
            background-color: var(--void-bg);
            background-image: radial-gradient(circle at center, #0d121a 0%, #000000 100%);
            color: var(--soul-color);
            font-family: 'Cormorant Garamond', serif;
            margin: 0;
            padding: 40px;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        #fireflies-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .firefly {
            position: absolute;
            width: 3px;
            height: 3px;
            background-color: #e2e8f0;
            border-radius: 50%;
            box-shadow: 0 0 8px 2px rgba(226, 232, 240, 0.6);
            opacity: 0;
            animation: float-up linear infinite, fade-in-out ease-in-out infinite;
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) scale(1); }
            100% { transform: translateY(-10vh) scale(1.5); }
        }
        @keyframes fade-in-out {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.8; }
        }

        h1, h2, h3 {
            font-family: 'Cinzel', serif;
            color: var(--active-glow);
            font-weight: normal;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(216, 226, 240, 0.4);
            margin-top: 0;
        }

        /* --- ЭКРАН ВХОДА И МОДАЛКИ --- */
        #auth-screen, #settings-modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 4, 6, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        #settings-modal {
            display: none;
            z-index: 200;
        }

        .auth-box {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(139, 155, 180, 0.05);
            min-width: 300px;
        }

        .auth-input, .settings-select {
            width: 300px;
            padding: 12px;
            margin: 10px 0 20px 0;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            color: var(--active-glow);
            font-family: monospace;
            text-align: center;
            outline: none;
            box-sizing: border-box;
        }
        
        .settings-select {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1em;
            cursor: pointer;
        }
        .settings-select option {
            background: var(--void-bg);
            color: var(--soul-color);
        }

        .auth-input:focus, .settings-select:focus {
            border-color: var(--soul-color);
            box-shadow: 0 0 10px rgba(139, 155, 180, 0.2);
        }

        .auth-btn {
            background: transparent;
            border: 1px solid var(--soul-color);
            color: var(--active-glow);
            padding: 10px 20px;
            font-family: 'Cinzel', serif;
            font-size: 1.1em;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .auth-btn:hover {
            background: rgba(139, 155, 180, 0.1);
            box-shadow: 0 0 15px rgba(139, 155, 180, 0.4);
        }

        .container {
            display: none; 
            width: 100%;
            max-width: 1100px;
            height: 85vh;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(139, 155, 180, 0.05);
            border-radius: 8px;
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        .sidebar {
            width: 30%;
            border-right: 1px solid var(--border-color);
            padding: 25px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
        }

        .playlist-item {
            padding: 12px 10px;
            margin-bottom: 5px;
            font-size: 1.2em;
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 1px solid transparent;
            color: #a0aec0;
        }

        .playlist-item:hover, .playlist-item.active {
            color: #fff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid #4a5568;
        }
        
        .sidebar-bottom {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-btn {
            background: transparent;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            transition: 0.3s;
            border: 1px solid var(--border-color);
            color: var(--soul-color);
        }
        
        .menu-btn:hover {
            background: rgba(139, 155, 180, 0.1);
            color: var(--active-glow);
            border-color: var(--soul-color);
        }

        .logout-btn { border: 1px solid #742a2a; color: #fc8181; }
        .logout-btn:hover { background: rgba(116, 42, 42, 0.2); border-color: #fc8181; color: #fff; }

        .main-panel {
            width: 70%;
            display: flex;
            flex-direction: column;
            padding: 25px;
            position: relative;
        }

        .player-area {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 15px;
        }

        .now-playing {
            font-size: 1.6em;
            min-height: 35px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .source-indicator {
            font-family: 'Cinzel', serif;
            font-size: 0.8em;
            color: #4a5568;
            letter-spacing: 1px;
            margin-top: 5px;
            margin-bottom: 20px;
        }

        audio { display: none; }

        .custom-controls { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 650px; margin: 0 auto; }
        .buttons-row { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; }

        .ctrl-btn { background: none; border: none; color: var(--soul-color); cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; padding: 10px; border-radius: 50%; }
        .ctrl-btn svg { width: 24px; height: 24px; fill: currentColor; transition: 0.3s; }
        .ctrl-btn:hover { color: var(--active-glow); filter: drop-shadow(0 0 8px var(--active-glow)); }
        .ctrl-btn.active { color: #fff; filter: drop-shadow(0 0 12px #fff); }
        .play-btn svg { width: 40px; height: 40px; }

        .progress-row { display: flex; align-items: center; width: 100%; gap: 15px; font-family: sans-serif; font-size: 0.85em; }

        input[type="range"] { -webkit-appearance: none; background: #2d3748; border-radius: 2px; outline: none; cursor: pointer; }
        #progress-bar { flex-grow: 1; height: 2px; }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%;
            background: var(--active-glow); box-shadow: 0 0 8px var(--active-glow); transition: 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }

        .volume-container { position: relative; display: flex; align-items: center; justify-content: center; margin-left: 10px; }

        .volume-slider-wrapper {
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); width: 32px; height: 110px;
            background: rgba(15, 20, 28, 0.95); border: 1px solid var(--border-color); border-radius: 6px;
            display: flex; justify-content: center; align-items: center; box-shadow: 0 -5px 20px rgba(0,0,0,0.8);
            opacity: 0; visibility: hidden; transition: all 0.2s ease-in-out; backdrop-filter: blur(4px);
        }

        .volume-container:hover .volume-slider-wrapper { opacity: 1; visibility: visible; bottom: 40px; }
        #volume-bar { width: 90px; height: 2px; transform: rotate(-90deg); margin: 0; }

        .search-container { margin-bottom: 15px; position: relative; }
        #track-search {
            width: 100%; padding: 10px 15px; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-color);
            border-radius: 4px; color: var(--active-glow); font-family: 'Cormorant Garamond', serif; font-size: 1.1em;
            outline: none; transition: 0.3s; box-sizing: border-box;
        }
        #track-search::placeholder { color: #4a5568; font-style: italic; }
        #track-search:focus { border-color: var(--soul-color); background: rgba(0, 0, 0, 0.6); box-shadow: inset 0 0 10px rgba(139, 155, 180, 0.1); }

        .track-list { flex-grow: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .track-item { padding: 10px; font-size: 1.2em; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; border-left: 2px solid transparent; }
        .track-item:hover { background: rgba(255, 255, 255, 0.03); text-shadow: 0 0 5px rgba(139, 155, 180, 0.5); }
        .track-item.playing { color: #ffffff; border-left: 2px solid var(--soul-color); background: rgba(139, 155, 180, 0.1); text-shadow: 0 0 10px var(--soul-glow); }

        .badge { font-family: sans-serif; font-size: 0.6em; padding: 2px 6px; border: 1px solid #2d3748; border-radius: 3px; color: #718096; }
        .badge.blocked { color: #fc8181; border-color: #742a2a; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a5568; }
    </style>
</head>
<body>

    <div id="fireflies-container"></div>

    <div id="auth-screen">
        <div class="auth-box">
            <h2>Связь с Архивом</h2>
            <div style="font-size: 0.9em; color: #6a7a9c;">Введи токен, чтобы открыть Пустоту</div>
            <input type="text" id="token-input" class="auth-input" placeholder="Токен..." autocomplete="off">
            <br>
            <button class="auth-btn" onclick="saveToken()">Пробуждение</button>
            <div id="auth-error" style="color: #fc8181; margin-top: 15px; display: none;"></div>
        </div>
    </div>
    
    <div id="settings-modal">
        <div class="auth-box">
            <h2>Настройки Мутанта</h2>
            
            <div style="font-size: 0.9em; color: #6a7a9c; margin-bottom: 5px;">Источник плейлистов</div>
            <select id="platform-select" class="settings-select">
                <option value="yandex">Yandex Music</option>
                <option value="vk">VK Музыка (Взломать)</option>
                <option value="spotify">Spotify (Взломать)</option>
                <option value="soundcloud">SoundCloud (Взломать)</option>
            </select>
            
            <div style="font-size: 0.9em; color: #6a7a9c; margin-top: 15px; margin-bottom: 5px;">Поиск серых треков (Мутация)</div>
            <select id="mutation-select" class="settings-select">
                <option value="auto">Автокаскад (Искать везде)</option>
                <option value="sc">Только SoundCloud</option>
                <option value="ytm">Только YouTube Music</option>
                <option value="yt">Только YouTube</option>
            </select>
            <br>
            <button class="auth-btn" onclick="saveSettings()">Сохранить патч</button>
        </div>
    </div>

    <div class="container" id="main-ui">
        <div class="sidebar">
            <h2>Архивы</h2>
            <div id="playlists-container"></div>
            
            <div class="sidebar-bottom">
                <button class="menu-btn" onclick="openSettings()">Настройки</button>
                <button class="menu-btn logout-btn" onclick="logout()">Забыть токен</button>
            </div>
        </div>

        <div class="main-panel">
            <div class="player-area">
                <div class="now-playing" id="now-playing-title">Тишина</div>
                <div class="source-indicator" id="source-indicator">Ждет команды</div>
                
                <audio id="audio-player"></audio>

                <div class="custom-controls">
                    <div class="buttons-row">
                        <button class="ctrl-btn" id="btn-shuffle"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
                        <button class="ctrl-btn" id="btn-prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                        <button class="ctrl-btn play-btn" id="btn-play">
                            <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>
                        <button class="ctrl-btn" id="btn-next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                        <button class="ctrl-btn" id="btn-loop"><svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg></button>
                    </div>
                    
                    <div class="progress-row">
                        <span id="time-current">0:00</span>
                        <input type="range" id="progress-bar" value="0" step="1" min="0">
                        <span id="time-total">0:00</span>

                        <div class="volume-container" id="vol-container">
                            <button class="ctrl-btn" id="btn-mute" style="padding: 0;">
                                <svg id="icon-vol-up" viewBox="0 0 24 24" style="width: 20px; height: 20px;"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                                <svg id="icon-vol-mute" viewBox="0 0 24 24" style="width: 20px; height: 20px; display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                            </button>
                            <div class="volume-slider-wrapper">
                                <input type="range" id="volume-bar" value="1" step="0.05" min="0" max="1">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="search-container">
                <input type="text" id="track-search" placeholder="Поиск в Архиве (название или автор)...">
            </div>
            
            <ul class="track-list" id="track-list">
                <div style="text-align: center; color: #4a5568; margin-top: 50px; font-style: italic;">
                    Выберите архив слева...
                </div>
            </ul>
        </div>
    </div>

    <script>
        const API_BASE = 'https://huescapist-playera.hf.space'; 

        // --- ЛЮМАФЛАИ ---
        const firefliesContainer = document.getElementById('fireflies-container');
        for (let i = 0; i < 30; i++) {
            let firefly = document.createElement('div');
            firefly.className = 'firefly';
            firefly.style.left = Math.random() * 100 + 'vw';
            firefly.style.animationDuration = (Math.random() * 10 + 10) + 's, ' + (Math.random() * 3 + 2) + 's';
            firefly.style.animationDelay = (Math.random() * 10) + 's, ' + (Math.random() * 5) + 's';
            firefliesContainer.appendChild(firefly);
        }

        // --- НАСТРОЙКИ ПЛАТФОРМЫ И МУТАЦИИ ---
        let currentPlatform = localStorage.getItem('void_platform') || 'yandex';
        let currentMutation = localStorage.getItem('void_mutation') || 'auto';
        
        document.getElementById('platform-select').value = currentPlatform;
        document.getElementById('mutation-select').value = currentMutation;

        function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }

        function saveSettings() {
            currentPlatform = document.getElementById('platform-select').value;
            currentMutation = document.getElementById('mutation-select').value;
            
            localStorage.setItem('void_platform', currentPlatform);
            localStorage.setItem('void_mutation', currentMutation);
            
            document.getElementById('settings-modal').style.display = 'none';
            loadPlaylists(); 
        }

        // --- АВТОРИЗАЦИЯ И СЕТЬ ---
        let userToken = localStorage.getItem('yandex_token');
        const authScreen = document.getElementById('auth-screen');
        const mainUi = document.getElementById('main-ui');
        const errorDiv = document.getElementById('auth-error');

        function checkAuth() {
            if (userToken) { authScreen.style.display = 'none'; mainUi.style.display = 'flex'; loadPlaylists(); } 
            else { authScreen.style.display = 'flex'; mainUi.style.display = 'none'; }
        }

        function saveToken() {
            const input = document.getElementById('token-input').value.trim();
            if (!input) return;
            userToken = input;
            localStorage.setItem('yandex_token', userToken);
            errorDiv.style.display = 'none';
            checkAuth();
        }

        function logout() {
            localStorage.removeItem('yandex_token');
            userToken = null;
            document.getElementById('token-input').value = '';
            audioPlayer.pause();
            checkAuth();
        }

        async function apiFetch(endpoint) {
            const separator = endpoint.includes('?') ? '&' : '?';
            // МЕНЯЕМ token НА key, чтобы обмануть антитрекинг браузера
            const finalUrl = API_BASE + endpoint + separator + 'key=' + encodeURIComponent(userToken);
            
            const response = await fetch(finalUrl);
            
            if (response.status === 401 || response.status === 422) {
                errorDiv.innerText = "Архив закрыт. Неверный токен.";
                errorDiv.style.display = 'block';
                logout();
                throw new Error("Unauthorized");
            }
            if (!response.ok) throw new Error("Server error");
            return response.json();
        }
            
            // Если токен сдох или Питон его не понял
            if (response.status === 401 || response.status === 422) {
                errorDiv.innerText = "Архив закрыт. Неверный токен.";
                errorDiv.style.display = 'block';
                logout();
                throw new Error("Unauthorized");
            }
            if (!response.ok) throw new Error("Server error");
            return response.json();
        

        // --- ЛОГИКА ПЛЕЕРА ---
        const audioPlayer = document.getElementById('audio-player');
        const trackListEl = document.getElementById('track-list');
        const playlistsEl = document.getElementById('playlists-container');
        const nowPlayingEl = document.getElementById('now-playing-title');
        const sourceIndicatorEl = document.getElementById('source-indicator');
        const searchInput = document.getElementById('track-search');

        const btnPlay = document.getElementById('btn-play'), iconPlay = document.getElementById('icon-play'), iconPause = document.getElementById('icon-pause');
        const btnPrev = document.getElementById('btn-prev'), btnNext = document.getElementById('btn-next');
        const btnShuffle = document.getElementById('btn-shuffle'), btnLoop = document.getElementById('btn-loop');
        const progressBar = document.getElementById('progress-bar'), timeCurrentEl = document.getElementById('time-current'), timeTotalEl = document.getElementById('time-total');
        
        const volContainer = document.getElementById('vol-container'), volumeBar = document.getElementById('volume-bar');
        const btnMute = document.getElementById('btn-mute'), iconVolUp = document.getElementById('icon-vol-up'), iconVolMute = document.getElementById('icon-vol-mute');

        let currentTracks = [], currentPlayingIndex = -1, isShuffle = false, lastVolume = 1; 
        audioPlayer.volume = volumeBar.value;

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.track-item').forEach(item => {
                item.style.display = item.innerText.toLowerCase().includes(query) ? 'flex' : 'none';
            });
        });

        async function loadPlaylists() {
            playlistsEl.innerHTML = '<div style="color:#6a7a9c; text-align:center;">Установка связи...</div>';
            trackListEl.innerHTML = '<div style="text-align:center; margin-top:50px; color:#4a5568; font-style:italic;">Выберите архив слева...</div>';
            
            if (currentPlatform !== 'yandex') {
                playlistsEl.innerHTML = `<div class="playlist-item" style="color: #fc8181; font-size: 0.9em; cursor: default;">API ${currentPlatform.toUpperCase()} еще не взломано. Вернись на Yandex.</div>`;
                return;
            }

            try {
                const playlists = await apiFetch('/api/playlists');
                playlistsEl.innerHTML = '';
                playlists.forEach(pl => {
                    const div = document.createElement('div');
                    div.className = 'playlist-item';
                    div.innerText = pl.title;
                    div.onclick = () => {
                        document.querySelectorAll('.playlist-item').forEach(el => el.classList.remove('active'));
                        div.classList.add('active');
                        loadTracks(pl.id);
                    };
                    playlistsEl.appendChild(div);
                });
            } catch (e) {
                if (e.message !== "Unauthorized") playlistsEl.innerHTML = '<div class="playlist-item">Связь потеряна</div>';
            }
        }

        async function loadTracks(playlistId) {
            trackListEl.innerHTML = '<div style="text-align:center; margin-top:50px; color:#8b9bb4;">Чтение мыслей...</div>';
            searchInput.value = ''; 
            try {
                currentTracks = await apiFetch(`/api/playlist/${playlistId}`);
                trackListEl.innerHTML = '';
                currentTracks.forEach((track, index) => {
                    const li = document.createElement('li');
                    li.className = 'track-item'; li.id = `track-${index}`;
                    const badge = track.available ? '<span class="badge">YANDEX</span>' : '<span class="badge blocked">MUTATED</span>';
                    li.innerHTML = `<span><b>${track.artist}</b> — ${track.title}</span>${badge}`;
                    li.onclick = () => playTrack(index);
                    trackListEl.appendChild(li);
                });
                if (currentPlayingIndex !== -1 && document.getElementById(`track-${currentPlayingIndex}`)) {
                    document.getElementById(`track-${currentPlayingIndex}`).classList.add('playing');
                }
            } catch (e) {
                // ТЕПЕРЬ ОН БУДЕТ ПИСАТЬ ОБ ОШИБКЕ, А НЕ ВИСЕТЬ БЕСКОНЕЧНО
                trackListEl.innerHTML = '<div style="text-align:center; margin-top:50px; color:#fc8181; font-style:italic;">Связь с Архивом оборвалась. Нажми F12, чтобы проверить консоль, или выбери плейлист заново.</div>';
                console.error("Ошибка загрузки треков:", e);
            }
        }

        async function playTrack(index) {
            currentPlayingIndex = index;
            const track = currentTracks[index];

            document.querySelectorAll('.track-item').forEach(el => el.classList.remove('playing'));
            const activeEl = document.getElementById(`track-${index}`);
            if (activeEl) { activeEl.classList.add('playing'); activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            
            nowPlayingEl.innerText = `${track.artist} — ${track.title}`;
            sourceIndicatorEl.innerText = "Фокусировка души...";
            
            audioPlayer.src = ""; progressBar.value = 0; timeCurrentEl.innerText = "0:00"; timeTotalEl.innerText = "0:00";
            togglePlayUI(false);

            try {
                // Передаем бэкенду выбор юзера через query параметр fallback
                const data = await apiFetch(`/api/stream/${track.id}?fallback=${currentMutation}`);
                
                audioPlayer.src = data.url;
                sourceIndicatorEl.innerText = `ИСТОЧНИК: ${data.source.toUpperCase()}`;
                audioPlayer.play();
                togglePlayUI(true);

                // --- МАГИЯ ДЛЯ ТЕЛЕФОНА (ФОНОВЫЙ РЕЖИМ И ЭКРАН БЛОКИРОВКИ) ---
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: track.title,
                        artist: track.artist,
                        artwork: [{ src: 'https://cdn-icons-png.flaticon.com/512/8121/8121287.png', sizes: '512x512', type: 'image/png' }]
                    });
                    navigator.mediaSession.setActionHandler('play', () => { btnPlay.click(); });
                    navigator.mediaSession.setActionHandler('pause', () => { btnPlay.click(); });
                    navigator.mediaSession.setActionHandler('previoustrack', () => { btnPrev.click(); });
                    navigator.mediaSession.setActionHandler('nexttrack', () => { btnNext.click(); });
                }

            } catch (e) {
                sourceIndicatorEl.innerText = "ПУСТОТА (ОШИБКА ПОТОКА)";
                setTimeout(() => playNext(), 2000);
            }
        }

        function togglePlayUI(isPlaying) {
            iconPlay.style.display = isPlaying ? 'none' : 'block';
            iconPause.style.display = isPlaying ? 'block' : 'none';
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60), sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        btnPlay.onclick = () => {
            if (!audioPlayer.src) return;
            audioPlayer.paused ? audioPlayer.play() : audioPlayer.pause();
            togglePlayUI(!audioPlayer.paused);
        };

        btnPrev.onclick = () => { if (currentPlayingIndex > 0) playTrack(currentPlayingIndex - 1); };

        function playNext() {
            if (currentTracks.length === 0) return;
            if (isShuffle) {
                let randomIndex = Math.floor(Math.random() * currentTracks.length);
                while (randomIndex === currentPlayingIndex && currentTracks.length > 1) { randomIndex = Math.floor(Math.random() * currentTracks.length); }
                playTrack(randomIndex);
            } else if (currentPlayingIndex < currentTracks.length - 1) {
                playTrack(currentPlayingIndex + 1);
            }
        }
        btnNext.onclick = playNext;

        btnShuffle.onclick = () => { isShuffle = !isShuffle; btnShuffle.classList.toggle('active'); };
        btnLoop.onclick = () => { audioPlayer.loop = !audioPlayer.loop; btnLoop.classList.toggle('active'); };

        function updateVolumeUI(vol) {
            iconVolUp.style.display = (vol === 0 || audioPlayer.muted) ? 'none' : 'block';
            iconVolMute.style.display = (vol === 0 || audioPlayer.muted) ? 'block' : 'none';
        }

        volContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            let currentVol = parseFloat(volumeBar.value);
            if (e.deltaY < 0) currentVol = Math.min(1, currentVol + 0.05);
            else if (e.deltaY > 0) currentVol = Math.max(0, currentVol - 0.05);
            volumeBar.value = currentVol; audioPlayer.volume = currentVol; audioPlayer.muted = false; 
            updateVolumeUI(currentVol);
        }, { passive: false });

        volumeBar.addEventListener('input', () => {
            audioPlayer.volume = volumeBar.value; audioPlayer.muted = false; 
            updateVolumeUI(parseFloat(volumeBar.value));
        });

        btnMute.onclick = () => {
            if (audioPlayer.muted || audioPlayer.volume === 0) {
                audioPlayer.muted = false; audioPlayer.volume = lastVolume > 0 ? lastVolume : 1; volumeBar.value = audioPlayer.volume;
            } else {
                lastVolume = audioPlayer.volume; audioPlayer.muted = true; volumeBar.value = 0;
            }
            updateVolumeUI(parseFloat(volumeBar.value));
        };

        audioPlayer.addEventListener('ended', () => { if (!audioPlayer.loop) playNext(); });
        audioPlayer.addEventListener('timeupdate', () => {
            progressBar.max = audioPlayer.duration || 0;
            progressBar.value = audioPlayer.currentTime;
            timeCurrentEl.innerText = formatTime(audioPlayer.currentTime);
            timeTotalEl.innerText = formatTime(audioPlayer.duration);
        });
        progressBar.addEventListener('input', () => { audioPlayer.currentTime = progressBar.value; });

        // Старт
        checkAuth();
    </script>
</body>
</html>
